dataset:
  seq_len: 24
  horizons: [1, 3, 6]
  split:
    train: 0.7
    val: 0.15
    test: 0.15
  wind_warning_threshold: 10.8
  risk_class_thresholds: [0.35, 0.55, 0.75]
  spring_months: [3, 4, 5]
  risk_weights:
    wind: 0.45
    dry: 0.16
    visibility: 0.10
    soil: 0.10
    spring: 0.07
    source_proximity: 0.12

training:
  batch_size: 32
  epochs: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 5
  num_workers: 0
  device: auto

model:
  name: DustRiskFormer
  hidden_dim: 64
  num_heads: 4
  dropout: 0.1

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  results_dir: results
  checkpoints_dir: results/checkpoints
